# Linter selection and configuration file for golangci-lint.
version: "2"
run:
  # Include test files or not.
  # Default: true
  tests: false
linters:
  # Disable all linters. It's important to have reproducible CI: don't start to fail all builds at the same time.
  # With golangci-lint this can happen if you use option --enable-all and a new linter is added
  # or when one upstream linter is upgraded.
  default: none
  # Enable specific linter
  # If linters should be disabled, comment out the respective line with explaination.
  enable:
    - arangolint
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - canonicalheader
    - containedctx
    - contextcheck
    - copyloopvar
    - cyclop
    - decorder
    - depguard
    - dogsled
    - dupl
    - dupword
    - durationcheck
    - embeddedstructfieldcheck
    #- err113 - enable after refactoring
    - errcheck
    - errchkjson
    - errname
    #- errorlint - enable after refactoring
    #- exhaustive - It's ok not not set every field in a struct
    #- exhaustruct - It's ok not not set every field in a struct
    - exptostd
    - fatcontext
    - forbidigo
    - forcetypeassert
    - funcorder
    - funlen
    - ginkgolinter
    - gocheckcompilerdirectives
    - gochecknoglobals
    #- gochecknoinits - init functions are needed for the plugin system
    - gochecksumtype
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - godoclint
    - godot
    #- godox - allow "TODO" and "FIXME" comments until v1.0
    - goheader
    - gomoddirectives
    - gomodguard
    - goprintffuncname
    - gosec
    - gosmopolitan
    - govet
    - grouper
    - iface
    - importas
    - inamedparam
    - ineffassign
    - interfacebloat
    - intrange
    - iotamixing
    - ireturn
    - lll
    - loggercheck
    - maintidx
    - makezero
    - mirror
    - misspell
    - mnd
    #- musttag - Not all fields need to be tagged for YAML parsing, as the default way of assigning is fine.
    - nakedret
    - nestif
    - nilerr
    - nilnesserr
    - nilnil
    - nlreturn
    - noctx
    - noinlineerr
    - nolintlint
    - nonamedreturns
    - nosprintfhostport
    #- paralleltest - Not necessary to do parallel tests for now, might enable later again
    #- perfsprint - Using fmt.Sprintf is fine, performance is not an issue.
    - prealloc
    - predeclared
    - promlinter
    - protogetter
    - reassign
    - recvcheck
    - revive
    - rowserrcheck
    - sloglint
    - spancheck
    - sqlclosecheck
    - staticcheck
    - tagalign
    - tagliatelle
    - testableexamples
    - testifylint
    #- testpackage - We don't enforce white box testing
    - thelper
    - tparallel
    - unconvert
    - unparam
    - unqueryvet
    - unused
    - usestdlibvars
    - usetesting
    - varnamelen
    - wastedassign
    - whitespace
    #- wrapcheck - Not ALL error should be wrapped, as they become part of the function API then.
    - wsl_v5
    - zerologlint

  settings:
    depguard:
      # Ban the standard library "log" package repo-wide. The project logs only
      # via internal/log (structured, context-carried) or log/slog. depguard
      # matches by import PATH, so internal/log — imported as `log` — is
      # unaffected (its path is github.com/.../internal/log, not "log").
      # log/slog is allowed explicitly because "log" is a path-prefix of it;
      # list-mode "lax" means only the denied package is blocked, everything
      # else (that matches neither list) stays allowed.
      rules:
        no-std-log:
          list-mode: lax
          allow:
            - log/slog
          deny:
            - pkg: log
              desc: use internal/log or log/slog directly, not the standard log package
    forbidigo:
      forbid:
        # Re-add forbidigo's defaults (defining `forbid` replaces them).
        - pattern: '^(fmt\.Print(|f|ln)|print|println)$'
          msg: do not print to stdout directly; use fmt.Fprint with an explicit writer, the output formatter, or slog
        - pattern: '^spew\.(ConfigState\.)?Dump$'
          msg: remove debug spew.Dump calls before committing
        # --- slog logging buckets -------------------------------------------
        # Logging idiom is enforced per region. The two (disjoint) patterns below
        # are the RESTRICTIONS; the per-region EXCEPTIONS live in
        # linters.exclusions.rules (search: "slog logging buckets"). Any file NOT
        # granted an exception there falls under the strictest, default rule:
        # the "request path" — obtain the logger from the request context.
        #
        # P1 — the levels the client forbids (its two-channel stdout/stderr model).
        # Fires in the client (its intended target) and, if misused, on the
        # agent/server request path.
        - pattern: '^slog\.(Info|Error|Log|LogAttrs|DebugContext|InfoContext|WarnContext|ErrorContext)$'
          msg: 'restricted slog level: in dutctl use slog.Debug/slog.Warn (two-channel model); on the dutagent/dutserver request path use log.FromContext(ctx). Per-region exceptions: see "slog logging buckets" in .golangci.yml'
        # P2 — any direct slog entry point; the default rule forbids it so
        # request-path code must derive the logger from context. Lifted for the
        # client (Debug/Warn) and for agent/server setup files (see exceptions).
        - pattern: '^slog\.(Debug|Warn|Default)$'
          msg: 'direct slog on the request path: use log.FromContext(ctx) in dutagent/dutserver request code. slog.* is allowed in the client and in agent/server setup files: see "slog logging buckets" in .golangci.yml'

    funcorder:
      # Checks if the exported methods of a structure are placed before the non-exported ones.
      # Default: true
      struct-method: false

    ireturn:
      # List of interfaces to allow.
      # Lists of the keywords and regular expressions matched to interface or package names can be used.
      # `allow` and `reject` settings cannot be used at the same time.
      #
      # Keywords:
      # - `empty` for `interface{}`
      # - `error` for errors
      # - `stdlib` for standard library
      # - `anon` for anonymous interfaces
      # - `generic` for generic interfaces added in go 1.18
      #
      # Default: [anon, error, empty, stdlib]
      allow:
        - anon
        - error
        - empty
        - stdlib
        - generic
        - Module
        - DeviceServiceClient
        - Formatter
        - gpio
        - port
        - Interceptor

    lll:
      line-length: 140

    nestif:
      min-complexity: 6

    varnamelen:
      max-distance: 6
      ignore-names:
        - err
        - fn
        - wg
        - s
        - ch
        - tt
        - r
        - fs
        - "on"
        - op
        - l # logger
        - b # strings.Builder / bytes.Buffer
        - w # io.Writer
      ignore-type-assert-ok: true
      ignore-map-index-ok: true
      ignore-chan-recv-ok: true

    wsl_v5:
      disable:
        - send

  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # === slog logging buckets ===
      # The two slog patterns in settings.forbidigo.forbid restrict logging per
      # region; these rules grant the per-region EXCEPTIONS. Any file NOT matched
      # below gets the default (strictest) "request path" rule: no direct slog —
      # obtain the logger from the request context with log.FromContext(ctx).
      # This is how the RPC handlers, FSM, broker/workers, relay and modules log.
      #
      # CLIENT — dutctl and its output rendering. Its two-channel output model
      # allows slog.Debug/slog.Warn only, so lift P2 (Debug/Warn/Default) here;
      # P1 keeps banning Info/Error/*Context. (Matches P2's message, not P1's.)
      - path: ^(cmds/dutctl/|internal/output/|internal/style/)
        linters:
          - forbidigo
        text: direct slog
      # AGENT SETUP / AGENT LIFECYCLE — process bootstrap, the module Init/Deinit lifecycle
      # summaries, the frozen-logger objects (locker, session, chanio) and the
      # internal/log package itself (its slog.Default fallback). No request
      # context exists here, so all slog.X is allowed: lift both P1 and P2.
      # (Matches the "slog logging buckets" tail shared by both messages.)
      - path: ^(cmds/dutagent/dutagent\.go|cmds/exp/dutserver/dutserver\.go|internal/dutagent/(init|session|locker)\.go|internal/chanio/chanio\.go|internal/log/)
        linters:
          - forbidigo
        text: slog logging buckets
    paths:
      - third_party$
      - builtin$
      - examples$

formatters:
  enable:
    - gci
    - gofmt
    - goimports
  settings:
    gci:
      # Section configuration to compare against.
      # Section names are case-insensitive and may contain parameters in ().
      # The default order of sections is `standard > default > custom > blank > dot > alias > localmodule`,
      # If `custom-order` is `true`, it follows the order of `sections` option.
      # Default: ["standard", "default"]
      sections:
        - standard # Standard section: captures all standard packages.
        - default # Default section: contains all imports that could not be matched to another section type.
        - blank # Blank section: contains all blank imports. This section is not present unless explicitly enabled.
        - alias # Alias section: contains all alias imports. This section is not present unless explicitly enabled.
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
