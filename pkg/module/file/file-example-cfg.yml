version: 2.0.0-alpha.1
devices:
  example-device:
    cmds:
      upload:
        desc: Upload file to device
        uses:
          - module: file
            passthrough: true
            with:
              operation: upload
      upload-script:
        desc: Upload and install a script
        uses:
          - module: file
            passthrough: true
            with:
              operation: upload
              destination: /opt/scripts/install.sh
              permission: '0755'
      fetch-logs:
        desc: Download logs from device
        uses:
          - module: file
            passthrough: true
            with:
              operation: download
              source: /var/log.txt
      upload-config:
        desc: Upload configuration file with fixed paths
        uses:
          - module: file
            passthrough: true
            with:
              operation: upload
              source: ./configs/device.conf
              destination: /etc/device/device.conf
              permission: '0644'
