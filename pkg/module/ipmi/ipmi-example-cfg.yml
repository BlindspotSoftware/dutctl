version: 1.0.0-alpha.1 # x-release-please-version
devices:
  fancy-server:
    desc: "A server with IPMI-managed power control"
    cmds:
      power:
        desc: "Power on the server using IPMI"
        uses:
          - module: ipmi
            with:
              host: 192.168.1.100
              port: 623
              user: user
              password: password
