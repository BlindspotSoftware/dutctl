version: 2.0.0-alpha.1
devices:
  xyz:
    desc: >-
      A mainboard that uses a Dediprog EM100Pro-G2 flash emulator during
      firmware development
    cmds:
      flash-emulate:
        desc: |
          Basic demo of the FlashEmulate module.
        uses:
          - module: flash-emulate
            passthrough: true
            with:
              chip: N25Q256A13
