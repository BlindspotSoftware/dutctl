version: 1.0.0-alpha.1 # x-release-please-version
devices:
  fancy-server:
    desc: "A server with power control via PDU"
    cmds:
      power-on:
        desc: "Turn the power ON via PDU"
        uses:
          - module: pdu
            passthrough: true
            with:
              host: http://192.168.1.100
              user: admin
              password: admin
              outlet: 6
